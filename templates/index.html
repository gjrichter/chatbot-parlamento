<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Parlamento Italiano</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --border: #d8d8d0;
    --accent: #1a4a8a;
    --accent-light: #e8f0fa;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --user-bg: #1a4a8a;
    --user-text: #ffffff;
    --tool-bg: #faf5e4;
    --tool-border: #d4b44a;
    --radius: 12px;
    --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: 1.6rem; }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 80%;
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 0.95rem;
    position: relative;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  /* markdown inside assistant bubble */
  .msg.assistant .bubble h1,
  .msg.assistant .bubble h2,
  .msg.assistant .bubble h3 { margin-top: .8em; margin-bottom: .3em; }
  .msg.assistant .bubble p { margin-bottom: .6em; }
  .msg.assistant .bubble p:last-child { margin-bottom: 0; }
  .msg.assistant .bubble ul, .msg.assistant .bubble ol {
    margin: .4em 0 .4em 1.3em;
  }
  .msg.assistant .bubble table {
    border-collapse: collapse;
    font-size: .87rem;
    margin: .5em 0;
    overflow-x: auto;
    display: block;
  }
  .msg.assistant .bubble th,
  .msg.assistant .bubble td {
    border: 1px solid var(--border);
    padding: 5px 10px;
    text-align: left;
  }
  .msg.assistant .bubble th { background: var(--bg); font-weight: 600; }
  .msg.assistant .bubble code {
    background: var(--bg);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: .88em;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .msg.assistant .bubble pre {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    font-size: .85em;
    margin: .5em 0;
  }
  .msg.assistant .bubble pre code { background: none; padding: 0; }
  /* tool-call status chip */
  .tool-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: .8rem;
    color: #7a6010;
    margin-bottom: 6px;
  }
  .tool-chip .spin { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* copy button */
  .copy-btn {
    align-self: flex-start;
    margin-top: 4px;
    margin-left: 4px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: .75rem;
    cursor: pointer;
    color: var(--muted);
    transition: background .15s;
  }
  .copy-btn:hover { background: var(--bg); }
  /* typing indicator */
  .typing .bubble { padding: 14px 18px; }
  .typing-dots { display: flex; gap: 5px; }
  .typing-dots span {
    width: 8px; height: 8px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  /* intro */
  #intro {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: .9rem;
  }
  #intro h2 { color: var(--text); font-size: 1.2rem; margin-bottom: 10px; }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }
  .sug {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: .82rem;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .sug:hover { border-color: var(--accent); background: var(--accent-light); }
  /* input bar */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    font-family: inherit;
    font-size: .95rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    line-height: 1.5;
    outline: none;
    transition: border-color .15s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    width: 44px;
    height: 44px;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  #send-btn:disabled { opacity: .4; cursor: default; }
  footer {
    text-align: center;
    font-size: .7rem;
    color: var(--muted);
    padding: 4px 0 8px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <span>🏛️</span>
  <h1>Chatbot Parlamento Italiano</h1>
</header>

<div id="chat">
  <div id="intro">
    <h2>Dati in tempo reale da Camera e Senato</h2>
    <p>Fai domande su parlamentari, votazioni, disegni di legge, interrogazioni e molto altro.</p>
    <div class="suggestions">
      <button class="sug" onclick="sendSuggestion(this)">Chi sono i deputati del M5S?</button>
      <button class="sug" onclick="sendSuggestion(this)">Ultime votazioni alla Camera</button>
      <button class="sug" onclick="sendSuggestion(this)">Come ha votato Schlein nell'ultima fiducia?</button>
      <button class="sug" onclick="sendSuggestion(this)">Classifica attività parlamentare per AIC</button>
      <button class="sug" onclick="sendSuggestion(this)">Qual è il governo attuale?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Scrivi una domanda…" rows="1"></textarea>
  <button id="send-btn" title="Invia">➤</button>
</div>
<footer>Dati aperti: <a href="https://dati.camera.it" target="_blank" style="color:inherit">Camera</a> · <a href="https://dati.senato.it" target="_blank" style="color:inherit">Senato</a></footer>

<script>
marked.setOptions({ breaks: true, gfm: true });

const chat = document.getElementById('chat');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const intro = document.getElementById('intro');

// In-memory conversation history (role: user|assistant, content: string)
const history = [];

function scrollDown() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function addMessage(role, html, raw) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'assistant') {
    bubble.innerHTML = html;
  } else {
    bubble.textContent = raw;
  }
  msg.appendChild(bubble);

  if (role === 'assistant') {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '📋 Copia';
    btn.onclick = () => {
      navigator.clipboard.writeText(raw || bubble.innerText).then(() => {
        btn.textContent = '✓ Copiato';
        setTimeout(() => { btn.textContent = '📋 Copia'; }, 1500);
      });
    };
    msg.appendChild(btn);
  }

  chat.appendChild(msg);
  scrollDown();
  return { msg, bubble };
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant typing';
  msg.innerHTML = '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  chat.appendChild(msg);
  scrollDown();
  return msg;
}

function addToolChip(container, name, args) {
  const labels = {
    search: '🔍 Ricerca parlamentare',
    deputy: '👤 Scheda deputato',
    senator: '👤 Scheda senatore',
    'person-career': '📋 Carriera parlamentare',
    bills: '📄 Disegni di legge (Camera)',
    bill: '📄 Scheda atto',
    votes: '🗳️ Votazioni Camera',
    'vote-detail': '🗳️ Dettaglio votazione Camera',
    'senato-votes': '🗳️ Votazioni Senato',
    aic: '📝 Interrogazioni e interpellanze',
    groups: '🏛️ Gruppi parlamentari',
    'group-members': '👥 Composizione gruppo',
    governments: '🏛️ Governi italiani',
    'gov-members': '🏛️ Membri del governo',
    rank: '📊 Classifica attività',
    sparql: '⚙️ Query dati parlamentari',
  };
  const chip = document.createElement('div');
  chip.className = 'tool-chip';
  const label = labels[name] || `🔧 ${name}`;
  if (args && Object.keys(args).length) {
    const hint = Object.entries(args).map(([k,v]) => `${k}: ${v}`).join(', ').slice(0, 60);
    chip.innerHTML = `<span class="spin">⏳</span> ${label} <em style="opacity:.7">(${hint})</em>`;
  } else {
    chip.innerHTML = `<span class="spin">⏳</span> ${label}`;
  }
  container.insertBefore(chip, container.querySelector('.bubble'));
  scrollDown();
  return chip;
}

async function sendMessage(text) {
  if (!text.trim()) return;
  intro.style.display = 'none';
  sendBtn.disabled = true;

  addMessage('user', null, text);
  history.push({ role: 'user', content: text });

  const typing = addTyping();

  let rawResponse = '';
  let chips = [];
  let msgEl = null;
  let bubbleEl = null;

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(0, -1) }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }

        if (evt.type === 'tool') {
          if (!msgEl) {
            chat.removeChild(typing);
            const el = addMessage('assistant', '', '');
            msgEl = el.msg;
            bubbleEl = el.bubble;
          }
          const chip = addToolChip(msgEl, evt.name, evt.args);
          chips.push(chip);
        }

        if (evt.type === 'token') {
          if (!msgEl) {
            chat.removeChild(typing);
            const el = addMessage('assistant', '', '');
            msgEl = el.msg;
            bubbleEl = el.bubble;
          }
          // done spinning once we get first token
          chips.forEach(c => { c.querySelector('.spin').textContent = '✅'; c.querySelector('.spin').classList.remove('spin'); });
          chips = [];
          rawResponse += evt.text;
          bubbleEl.innerHTML = marked.parse(rawResponse);
          scrollDown();
        }

        if (evt.type === 'done') {
          if (chat.contains(typing)) chat.removeChild(typing);
          history.push({ role: 'assistant', content: rawResponse });
          sendBtn.disabled = false;
          break;
        }

        if (evt.type === 'error') {
          if (chat.contains(typing)) chat.removeChild(typing);
          if (!msgEl) {
            const el = addMessage('assistant', '', '');
            bubbleEl = el.bubble;
          }
          bubbleEl.innerHTML = `<em style="color:#c0392b">⚠️ Errore: ${evt.message}</em>`;
          sendBtn.disabled = false;
          break;
        }
      }
    }
  } catch (e) {
    if (chat.contains(typing)) chat.removeChild(typing);
    addMessage('assistant', `<em style="color:#c0392b">⚠️ Errore di connessione: ${e.message}</em>`, '');
  }

  sendBtn.disabled = false;
}

function sendSuggestion(btn) {
  sendMessage(btn.textContent.trim());
}

// auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = input.value.trim();
    if (text) { input.value = ''; input.style.height = 'auto'; sendMessage(text); }
  }
});

sendBtn.addEventListener('click', () => {
  const text = input.value.trim();
  if (text) { input.value = ''; input.style.height = 'auto'; sendMessage(text); }
});
</script>
</body>
</html>
